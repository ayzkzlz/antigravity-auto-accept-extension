<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Accept Administration</title>
    <style>
        body {
            font-family: var(--vscode-font-family);
            color: var(--vscode-editor-foreground);
            background-color: var(--vscode-editor-background);
            padding: 20px;
        }
        h1 {
            color: var(--vscode-editor-foreground);
            border-bottom: 1px solid var(--vscode-panel-border);
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="number"], select {
            width: 100%;
            padding: 8px;
            background: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border: 1px solid var(--vscode-input-border);
            border-radius: 4px;
            margin-bottom: 20px;
        }
        button {
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            margin-right: 10px;
        }
        button:hover {
            opacity: 0.9;
        }
        .btn-success {
            background: #238636;
            color: #ffffff;
        }
        .btn-danger {
            background: #da3633;
            color: #ffffff;
        }
        .btn-secondary {
            background: var(--vscode-button-secondaryBackground);
            color: var(--vscode-button-secondaryForeground);
        }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .status-on {
            background: #238636;
            color: white;
        }
        .status-off {
            background: #da3633;
            color: white;
        }
        .action-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <h1>Auto-Accept Administration</h1>
    <p>Configure the behavior of the Auto-Accept plugin.</p>
    
    <div id="statusBadge" class="status-badge status-on">Status: ON</div>
    
    <div class="action-container">
        <button id="enableBtn" class="btn-success">Start Auto-Accept</button>
        <button id="disableBtn" class="btn-danger">Stop Auto-Accept</button>
    </div>
    
    <p style="font-size: 12px; color: var(--vscode-descriptionForeground);">
        <em>Note: This extension requires Antigravity IDE to be launched with <code>--remote-debugging-port=9000</code>.</em>
    </p>

    <div class="form-group">
        <label for="delayInput">Auto-Accept Delay (ms):</label>
        <input type="number" id="delayInput" value="1000" min="0" step="100">
    </div>

    <button id="saveDelayBtn" class="btn-secondary">Save Delay Settings</button>

    <script>
        const vscode = acquireVsCodeApi();
        
        let isEnabled = /*INJECT_ENABLED*/true/*END_INJECT*/;

        function updateUI(enabled) {
            isEnabled = enabled;
            const badge = document.getElementById('statusBadge');
            if (enabled) {
                badge.textContent = 'Status: ON';
                badge.className = 'status-badge status-on';
            } else {
                badge.textContent = 'Status: OFF';
                badge.className = 'status-badge status-off';
            }
        }

        // Initialize state
        updateUI(isEnabled);
        
        document.getElementById('enableBtn').addEventListener('click', () => {
            updateUI(true);
            vscode.postMessage({ command: 'setEnabled', enabled: true });
        });
        
        document.getElementById('disableBtn').addEventListener('click', () => {
            updateUI(false);
            vscode.postMessage({ command: 'setEnabled', enabled: false });
        });

        document.getElementById('saveDelayBtn').addEventListener('click', () => {
            const delay = document.getElementById('delayInput').value;
            vscode.postMessage({ command: 'setDelay', delay: delay });
        });
        
        window.addEventListener('message', event => {
            const message = event.data;
            if (message.command === 'updateState') {
                updateUI(message.enabled);
            }
        });
    </script>
</body>
</html>
